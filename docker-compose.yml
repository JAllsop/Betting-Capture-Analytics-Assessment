services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ot-sql-server
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Guest123!
      - MSSQL_PID=Developer

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ot-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  redis:
    image: redis:latest
    container_name: ot-redis
    ports:
      - "6379:6379"